<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axiom — API Tester</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #7c6aff;
    --accent2: #ff6a6a;
    --green: #4fffb0;
    --text: #e8e8f0;
    --muted: #555570;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

  /* Grid background */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: linear-gradient(var(--border) 1px, transparent 1px),
                      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 960px; margin: 0 auto; padding: 40px 24px; position: relative; z-index: 1; }

  header { display: flex; align-items: center; gap: 16px; margin-bottom: 48px; }
  .logo { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
  .logo span { color: var(--accent); }
  .badge { background: var(--accent); color: #fff; font-size: 10px; font-family: var(--mono); padding: 3px 8px; border-radius: 4px; font-weight: 700; letter-spacing: 1px; }

  /* Auth section */
  .section { margin-bottom: 32px; }
  .section-title {
    font-family: var(--mono); font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; margin-bottom: 12px;
  }

  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  input, textarea {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    font-family: var(--mono); font-size: 13px; padding: 10px 14px;
    border-radius: 8px; outline: none; transition: border-color 0.2s;
    flex: 1; min-width: 160px;
  }
  input:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 70px; }

  button {
    background: var(--accent); color: #fff; border: none; cursor: pointer;
    font-family: var(--mono); font-size: 12px; font-weight: 700;
    padding: 10px 18px; border-radius: 8px; letter-spacing: 0.5px;
    transition: opacity 0.2s, transform 0.1s; white-space: nowrap;
  }
  button:hover { opacity: 0.85; }
  button:active { transform: scale(0.97); }
  button.danger { background: var(--accent2); }
  button.secondary { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  button.secondary:hover { border-color: var(--accent); color: var(--accent); }

  /* Token display */
  .token-box {
    background: var(--bg); border: 1px solid var(--green);
    border-radius: 8px; padding: 10px 14px;
    font-family: var(--mono); font-size: 11px; color: var(--green);
    word-break: break-all; display: none; margin-top: 10px;
  }
  .token-box.visible { display: block; }

  /* Response */
  .response {
    background: #07070d; border: 1px solid var(--border);
    border-radius: 8px; padding: 14px; margin-top: 10px;
    font-family: var(--mono); font-size: 12px; line-height: 1.6;
    white-space: pre-wrap; word-break: break-all; display: none;
    max-height: 300px; overflow-y: auto;
  }
  .response.visible { display: block; }
  .response.ok { border-color: var(--green); color: var(--green); }
  .response.err { border-color: var(--accent2); color: var(--accent2); }

  /* Posts feed */
  .post-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px; margin-bottom: 10px;
    transition: border-color 0.2s;
  }
  .post-card:hover { border-color: var(--accent); }
  .post-meta { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-bottom: 8px; display: flex; justify-content: space-between; }
  .post-text { font-size: 15px; line-height: 1.5; margin-bottom: 12px; }
  .post-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .post-actions button { padding: 6px 12px; font-size: 11px; }
  .post-id { color: var(--accent); font-weight: 700; }

  /* Status bar */
  .status-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 8px 24px; font-family: var(--mono); font-size: 11px;
    color: var(--muted); display: flex; gap: 24px; z-index: 100;
  }
  .status-bar .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 6px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .label { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .input-group { margin-bottom: 10px; }
  .input-group:last-child { margin-bottom: 0; }

  .tabs { display: flex; gap: 4px; margin-bottom: 20px; }
  .tab { padding: 8px 16px; border-radius: 8px; font-family: var(--mono); font-size: 12px; cursor: pointer; border: 1px solid var(--border); color: var(--muted); background: transparent; transition: all 0.2s; }
  .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Toast */
  #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    padding: 10px 16px; border-radius: 8px; font-family: var(--mono); font-size: 12px;
    display: flex; align-items: center; gap: 10px; min-width: 260px;
    border: 1px solid; animation: slideIn 0.3s ease; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .toast.success { background: #0a1a12; border-color: var(--green); color: var(--green); }
  .toast.error   { background: #1a0a0a; border-color: var(--accent2); color: var(--accent2); }
  .toast.info    { background: #0d0d1a; border-color: var(--accent); color: var(--accent); }
  .toast-icon { font-size: 14px; }
  @keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes fadeOut { to { opacity: 0; transform: translateX(40px); } }

  /* Request Log Panel */
  #log-panel {
    position: fixed; right: 0; top: 0; bottom: 40px; width: 380px;
    background: #07070d; border-left: 1px solid var(--border);
    transform: translateX(100%); transition: transform 0.3s ease;
    z-index: 200; display: flex; flex-direction: column;
  }
  #log-panel.open { transform: translateX(0); }
  .log-header {
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    font-family: var(--mono); font-size: 12px; color: var(--text);
    display: flex; justify-content: space-between; align-items: center;
    flex-shrink: 0;
  }
  .log-header span { color: var(--accent); font-weight: 700; }
  .log-clear { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 4px 10px; font-size: 10px; }
  #log-entries { overflow-y: auto; flex: 1; padding: 8px; }
  .log-entry {
    border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px;
    overflow: hidden; cursor: pointer;
  }
  .log-entry:hover { border-color: var(--muted); }
  .log-entry-head {
    padding: 8px 12px; display: flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: 11px;
  }
  .log-entry.success .log-entry-head { background: #0a1a12; }
  .log-entry.error   .log-entry-head { background: #1a0a0a; }
  .log-entry.pending .log-entry-head { background: #0d0d1a; }
  .log-status {
    font-weight: 700; font-size: 12px; padding: 2px 6px; border-radius: 4px;
  }
  .log-entry.success .log-status { color: var(--green); }
  .log-entry.error   .log-status { color: var(--accent2); }
  .log-entry.pending .log-status { color: var(--accent); }
  .log-method { color: var(--accent); font-weight: 700; }
  .log-path { color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .log-time { color: var(--muted); font-size: 10px; margin-left: auto; }
  .log-body {
    display: none; padding: 10px 12px;
    border-top: 1px solid var(--border);
    font-family: var(--mono); font-size: 11px; line-height: 1.6;
    white-space: pre-wrap; word-break: break-all; max-height: 200px; overflow-y: auto;
  }
  .log-body.expanded { display: block; }
  .log-entry.success .log-body { color: var(--green); }
  .log-entry.error   .log-body { color: var(--accent2); }
  .log-section-label { font-size: 10px; color: var(--muted); margin-bottom: 4px; }

  /* Log toggle button */
  #log-toggle {
    position: fixed; right: 20px; bottom: 52px; z-index: 300;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-family: var(--mono); font-size: 11px;
    padding: 8px 14px; border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
  }
  #log-toggle:hover { border-color: var(--accent); color: var(--accent); }
  #log-count {
    background: var(--accent); color: #fff; border-radius: 10px;
    padding: 1px 6px; font-size: 10px; font-weight: 700;
  }
  #log-count.has-error { background: var(--accent2); }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">AX<span>IOM</span></div>
    <div class="badge">API TESTER</div>
  </header>

  <!-- Auth -->
  <div class="section">
    <div class="section-title">Authentication</div>
    <div class="card">
      <div class="tabs">
        <div class="tab active" onclick="switchTab('signup')">Signup</div>
        <div class="tab" onclick="switchTab('login')">Login</div>
      </div>

      <div id="tab-signup" class="tab-content active">
        <div class="row">
          <input id="su-user" placeholder="username" />
          <input id="su-pass" placeholder="password" type="password" />
          <button onclick="signup()">SIGN UP</button>
        </div>
        <div id="signup-res" class="response"></div>
      </div>

      <div id="tab-login" class="tab-content">
        <div class="row">
          <input id="li-user" placeholder="username" />
          <input id="li-pass" placeholder="password" type="password" />
          <button onclick="login()">LOGIN</button>
        </div>
        <div id="login-res" class="response"></div>
        <div id="token-display" class="token-box"></div>
      </div>
    </div>
  </div>

  <!-- Posts -->
  <div class="section">
    <div class="section-title">Posts</div>
    <div class="card">
      <div class="row" style="margin-bottom:10px">
        <textarea id="post-text" placeholder="What's on your mind?"></textarea>
        <button onclick="createPost()">POST</button>
      </div>
      <div id="create-res" class="response"></div>
    </div>
    <div class="card">
      <div class="row">
        <button onclick="listPosts()" style="background:transparent;border:1px solid var(--accent);color:var(--accent)">LOAD FEED</button>
        <input id="page-num" placeholder="page (0)" style="max-width:120px" />
      </div>
      <div id="feed" style="margin-top:14px"></div>
    </div>
  </div>

  <!-- Single Post Actions -->
  <div class="section">
    <div class="section-title">Post Actions</div>
    <div class="card">
      <div class="input-group">
        <div class="label">POST ID</div>
        <input id="action-postid" placeholder="e.g. 1" style="max-width:200px" />
      </div>
      <div class="row" style="margin-bottom:10px">
        <button onclick="getPost()">GET POST</button>
        <button onclick="likePost()">👍 LIKE</button>
        <button onclick="unlikePost()" class="secondary">UNLIKE</button>
        <button onclick="repost()">🔁 REPOST</button>
        <button onclick="deletePost()" class="danger">DELETE POST</button>
      </div>
      <div id="action-res" class="response"></div>
    </div>

    <div class="card">
      <div class="label">COMMENT on post</div>
      <div class="row" style="margin-bottom:10px">
        <input id="comment-postid" placeholder="Post ID" style="max-width:120px" />
        <input id="comment-text" placeholder="Your comment..." />
        <button onclick="addComment()">COMMENT</button>
      </div>
      <div class="label" style="margin-top:10px">DELETE comment</div>
      <div class="row">
        <input id="del-postid" placeholder="Post ID" style="max-width:120px" />
        <input id="del-commentid" placeholder="Comment ID" style="max-width:140px" />
        <button onclick="deleteComment()" class="danger">DELETE</button>
      </div>
      <div id="comment-res" class="response"></div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast-container"></div>

<!-- Log Panel -->
<div id="log-panel">
  <div class="log-header">
    <span>REQUEST LOG</span>
    <div style="display:flex;gap:8px;align-items:center">
      <span id="log-summary" style="color:var(--muted);font-weight:400;font-size:10px"></span>
      <button class="log-clear" onclick="clearLogs()">CLEAR</button>
    </div>
  </div>
  <div id="log-entries"><div style="color:var(--muted);font-family:var(--mono);font-size:11px;padding:16px;text-align:center">No requests yet.</div></div>
</div>

<!-- Log Toggle -->
<button id="log-toggle" onclick="toggleLog()">
  📋 LOGS <span id="log-count">0</span>
</button>

<div class="status-bar">
  <span><span class="dot"></span>localhost:8080</span>
  <span id="status-token">TOKEN: none</span>
</div>

<script>
const BASE = 'http://localhost:8080';
let token = '';
let logs = [];
let logOpen = false;

// ── Toast ──────────────────────────────────────────────
function toast(msg, type = 'info') {
  const icons = { success: '✓', error: '✗', info: '◈' };
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span class="toast-icon">${icons[type]}</span><span>${msg}</span>`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => {
    el.style.animation = 'fadeOut 0.3s ease forwards';
    setTimeout(() => el.remove(), 300);
  }, 3000);
}

// ── Log Panel ──────────────────────────────────────────
function toggleLog() {
  logOpen = !logOpen;
  document.getElementById('log-panel').classList.toggle('open', logOpen);
}

function clearLogs() {
  logs = [];
  renderLogs();
  updateLogCount();
}

function updateLogCount() {
  const count = document.getElementById('log-count');
  const errors = logs.filter(l => !l.ok).length;
  count.textContent = logs.length;
  count.className = errors > 0 ? 'has-error' : '';
  const s = logs.filter(l => l.ok).length;
  const f = logs.filter(l => !l.ok).length;
  document.getElementById('log-summary').textContent = logs.length ? `${s} ok · ${f} failed` : '';
}

function renderLogs() {
  const container = document.getElementById('log-entries');
  if (!logs.length) {
    container.innerHTML = '<div style="color:var(--muted);font-family:var(--mono);font-size:11px;padding:16px;text-align:center">No requests yet.</div>';
    return;
  }
  container.innerHTML = [...logs].reverse().map((l, i) => `
    <div class="log-entry ${l.ok ? 'success' : 'error'}" onclick="toggleLogEntry(${logs.length-1-i})">
      <div class="log-entry-head">
        <span class="log-status">${l.status}</span>
        <span class="log-method">${l.method}</span>
        <span class="log-path">${l.path}</span>
        <span class="log-time">${l.time}</span>
      </div>
      <div class="log-body ${l.expanded ? 'expanded' : ''}" id="log-body-${logs.length-1-i}">
        <div class="log-section-label">REQUEST</div>
        <div style="margin-bottom:8px">${l.reqBody ? JSON.stringify(l.reqBody, null, 2) : '(no body)'}</div>
        <div class="log-section-label">RESPONSE (${l.duration}ms)</div>
        <div>${typeof l.data === 'object' ? JSON.stringify(l.data, null, 2) : l.data || '(empty)'}</div>
      </div>
    </div>
  `).join('');
}

function toggleLogEntry(i) {
  logs[i].expanded = !logs[i].expanded;
  renderLogs();
}

function addLog(method, path, status, ok, data, reqBody, duration) {
  logs.push({
    method, path, status, ok, data, reqBody, duration,
    time: new Date().toLocaleTimeString(), expanded: false
  });
  renderLogs();
  updateLogCount();
}

// ── Core request ───────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.target.classList.add('active');
}

function showRes(id, data, ok) {
  const el = document.getElementById(id);
  el.textContent = JSON.stringify(data, null, 2);
  el.className = 'response visible ' + (ok ? 'ok' : 'err');
}

async function req(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  if (body) opts.body = JSON.stringify(body);
  const start = Date.now();
  try {
    const res = await fetch(BASE + path, opts);
    const duration = Date.now() - start;
    const text = await res.text();
    let data;
    try { data = JSON.parse(text); } catch { data = text; }
    addLog(method, path, res.status, res.ok, data, body, duration);
    if (res.ok) toast(`${method} ${path} → ${res.status}`, 'success');
    else toast(`${method} ${path} → ${res.status} failed`, 'error');
    return { ok: res.ok, data, status: res.status };
  } catch (e) {
    addLog(method, path, 'ERR', false, e.message, body, Date.now() - start);
    toast(`Network error: ${e.message}`, 'error');
    return { ok: false, data: e.message, status: 0 };
  }
}

async function signup() {
  const u = document.getElementById('su-user').value;
  const p = document.getElementById('su-pass').value;
  const r = await req('POST', '/api/auth/signup', { username: u, password: p });
  showRes('signup-res', r.data, r.ok);
}

async function login() {
  const u = document.getElementById('li-user').value;
  const p = document.getElementById('li-pass').value;
  const r = await req('POST', '/api/auth/login', { username: u, password: p });
  showRes('login-res', r.data, r.ok);
  if (r.ok && r.data.token) {
    token = r.data.token;
    const td = document.getElementById('token-display');
    td.textContent = '✓ ' + token;
    td.classList.add('visible');
    document.getElementById('status-token').textContent = 'TOKEN: ' + token.substring(0, 30) + '...';
  }
}

async function createPost() {
  const text = document.getElementById('post-text').value;
  const r = await req('POST', '/api/posts', { text });
  showRes('create-res', r.data, r.ok);
  if (r.ok) listPosts();
}

async function listPosts() {
  const page = document.getElementById('page-num').value || 0;
  const r = await req('GET', `/api/posts?page=${page}&size=20`);
  const feed = document.getElementById('feed');
  if (!r.ok) { feed.innerHTML = `<div style="color:var(--accent2);font-family:var(--mono);font-size:12px">${JSON.stringify(r.data)}</div>`; return; }
  if (!r.data.length) { feed.innerHTML = '<div style="color:var(--muted);font-family:var(--mono);font-size:12px">No posts yet.</div>'; return; }
  feed.innerHTML = r.data.map(p => `
    <div class="post-card">
      <div class="post-meta">
        <span><span class="post-id">#${p.id}</span> · ${p.authorUsername}</span>
        <span>${new Date(p.createdAt).toLocaleString()}</span>
      </div>
      <div class="post-text">${p.text}</div>
      <div class="post-actions">
        <button onclick="quickLike(${p.id})">👍 ${p.likeCount}</button>
        <button class="secondary" onclick="document.getElementById('action-postid').value='${p.id}'">SELECT</button>
        <button class="danger" onclick="quickDelete(${p.id})">🗑</button>
      </div>
    </div>
  `).join('');
}

async function getPost() {
  const id = document.getElementById('action-postid').value;
  const r = await req('GET', `/api/posts/${id}`);
  showRes('action-res', r.data, r.ok);
}

async function likePost() {
  const id = document.getElementById('action-postid').value;
  const r = await req('POST', `/api/posts/${id}/like`);
  showRes('action-res', r.data, r.ok);
  listPosts();
}

async function unlikePost() {
  const id = document.getElementById('action-postid').value;
  const r = await req('DELETE', `/api/posts/${id}/like`);
  showRes('action-res', r.data, r.ok);
  listPosts();
}

async function repost() {
  const id = document.getElementById('action-postid').value;
  const r = await req('POST', `/api/posts/${id}/repost`);
  showRes('action-res', r.data, r.ok);
}

async function deletePost() {
  const id = document.getElementById('action-postid').value;
  const r = await req('DELETE', `/api/posts/${id}`);
  showRes('action-res', { status: r.status, message: r.ok ? 'Deleted' : r.data }, r.ok);
  if (r.ok) listPosts();
}

async function quickLike(id) {
  await req('POST', `/api/posts/${id}/like`);
  listPosts();
}

async function quickDelete(id) {
  await req('DELETE', `/api/posts/${id}`);
  listPosts();
}

async function addComment() {
  const postId = document.getElementById('comment-postid').value;
  const text = document.getElementById('comment-text').value;
  const r = await req('POST', `/api/posts/${postId}/comment`, { text });
  showRes('comment-res', r.data, r.ok);
}

async function deleteComment() {
  const postId = document.getElementById('del-postid').value;
  const commentId = document.getElementById('del-commentid').value;
  const r = await req('DELETE', `/api/posts/${postId}/comment/${commentId}`);
  showRes('comment-res', { status: r.status, message: r.ok ? 'Deleted' : r.data }, r.ok);
}
</script>
</body>
</html>
